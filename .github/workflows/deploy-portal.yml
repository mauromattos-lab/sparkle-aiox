# Deploy Sparkle Portal (Docker) to VPS
# Triggers on push to main when portal/ files change.
# Builds Docker image on VPS, swaps container, verifies response.
#
# Required GitHub Secrets:
#   VPS_SSH_KEY       - Private SSH key for root@VPS (content of ~/.ssh/sparkle_vps)
#   VPS_HOST          - VPS IP address (187.77.37.88)
#   SUPABASE_ANON_KEY - Supabase anonymous/public key for portal build args

name: Deploy Portal

on:
  push:
    branches: [main]
    paths:
      - 'portal/**'
      - '.github/workflows/deploy-portal.yml'
  workflow_dispatch:

concurrency:
  group: deploy-portal
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy sparkle-portal to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_DIR="/opt/sparkle-aiox/portal"
            CONTAINER_NAME="sparkle-portal"
            IMAGE_NAME="sparkle-portal:latest"
            PORTAL_URL="https://portal.sparkleai.tech"
            NEXT_PUBLIC_SUPABASE_URL="https://gqhdspayjtiijcqklbys.supabase.co"
            NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
            RUNTIME_URL="https://runtime.sparkleai.tech"
            RUNTIME_API_KEY="${{ secrets.RUNTIME_API_KEY }}"
            MAX_RETRIES=6
            RETRY_INTERVAL=5

            echo "=== [1/6] Pulling latest changes ==="
            cd /opt/sparkle-aiox
            git fetch origin main
            git reset --hard origin/main

            echo "=== [2/6] Building Docker image ==="
            cd "$DEPLOY_DIR"
            docker build \
              --build-arg NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
              -t "$IMAGE_NAME" .

            echo "=== [3/6] Stopping old container ==="
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm "$CONTAINER_NAME" 2>/dev/null || true

            echo "=== [4/6] Starting new container ==="
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --label "coolify.managed=true" \
              --network coolify \
              -p 3001:3000 \
              -e RUNTIME_URL="$RUNTIME_URL" \
              -e RUNTIME_API_KEY="$RUNTIME_API_KEY" \
              "$IMAGE_NAME"

            echo "=== [5/6] Verifying portal responds ==="
            HEALTHY=false
            for i in $(seq 1 $MAX_RETRIES); do
              sleep $RETRY_INTERVAL
              HTTP_CODE=$(curl -sk -o /dev/null -w '%{http_code}' "$PORTAL_URL" || echo "000")
              echo "  Attempt $i/$MAX_RETRIES — HTTP $HTTP_CODE"
              if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
                HEALTHY=true
                break
              fi
            done

            if [ "$HEALTHY" = true ]; then
              echo "=== [6/6] Portal deploy PASSED ==="
              echo "Cleaning up old images..."
              docker image prune -f
              exit 0
            fi

            echo "=== [6/6] Portal deploy FAILED ==="
            echo "Container logs:"
            docker logs "$CONTAINER_NAME" --tail 50
            exit 1
