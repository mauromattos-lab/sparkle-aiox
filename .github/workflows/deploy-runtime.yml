# Deploy Sparkle Runtime to VPS
# Triggers on push to main when sparkle-runtime/ files change.
# Uses SSH to pull, restart, verify health, and rollback on failure.
#
# Required GitHub Secrets:
#   VPS_SSH_KEY       - Private SSH key for root@VPS (content of ~/.ssh/sparkle_vps)
#   VPS_HOST          - VPS IP address (187.77.37.88)
#   SUPABASE_ANON_KEY - (used by deploy-portal, listed here for reference)

name: Deploy Runtime

on:
  push:
    branches: [main]
    paths:
      - 'sparkle-runtime/**'

concurrency:
  group: deploy-runtime
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy sparkle-runtime to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_DIR="/opt/sparkle-runtime"
            SERVICE="sparkle-runtime"
            ARQ_SERVICE="sparkle-arq"
            HEALTH_URL="http://127.0.0.1:8001/health"
            MAX_RETRIES=6
            RETRY_INTERVAL=5

            echo "=== [1/5] Saving current commit for rollback ==="
            cd "$DEPLOY_DIR"
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo "Previous commit: $PREVIOUS_COMMIT"

            echo "=== [2/5] Pulling latest changes ==="
            git pull origin main

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "New commit: $NEW_COMMIT"

            if [ "$PREVIOUS_COMMIT" = "$NEW_COMMIT" ]; then
              echo "No new changes — skipping restart."
              exit 0
            fi

            echo "=== [3/5] Restarting services ==="
            systemctl restart "$SERVICE"
            systemctl restart "$ARQ_SERVICE" 2>/dev/null || echo "WARN: $ARQ_SERVICE not found, skipping"

            echo "=== [4/5] Waiting for health check ==="
            HEALTHY=false
            for i in $(seq 1 $MAX_RETRIES); do
              sleep $RETRY_INTERVAL
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' "$HEALTH_URL" || echo "000")
              echo "  Attempt $i/$MAX_RETRIES — HTTP $HTTP_CODE"
              if [ "$HTTP_CODE" = "200" ]; then
                HEALTHY=true
                break
              fi
            done

            if [ "$HEALTHY" = true ]; then
              echo "=== [5/5] Health check PASSED ==="
              echo "Deploy successful: $NEW_COMMIT"
              exit 0
            fi

            echo "=== [5/5] Health check FAILED — ROLLING BACK ==="
            echo "Rolling back to $PREVIOUS_COMMIT"
            cd "$DEPLOY_DIR"
            git checkout "$PREVIOUS_COMMIT"
            systemctl restart "$SERVICE"
            systemctl restart "$ARQ_SERVICE" 2>/dev/null || true

            sleep 5
            ROLLBACK_CODE=$(curl -s -o /dev/null -w '%{http_code}' "$HEALTH_URL" || echo "000")
            if [ "$ROLLBACK_CODE" = "200" ]; then
              echo "Rollback successful — service restored at $PREVIOUS_COMMIT"
            else
              echo "CRITICAL: Rollback also failed (HTTP $ROLLBACK_CODE). Manual intervention required."
            fi

            exit 1
